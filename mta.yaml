_schema-version: 3.3.0
ID: my-first-cap
description: A simple CAP project.
version: 1.0.0
modules:
- name: my-first-cap-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: my-first-cap-xsuaa
  - name: my-first-cap-db
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: my-first-cap-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: my-first-cap-db
  parameters:
    buildpack: nodejs_buildpack
- name: my-first-cap-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: my-first-cap-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - myfirsttasks.zip
      name: myfirsttasks
      target-path: resources/
- name: myfirsttasks
  type: html5
  path: app/tasks
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
- name: my-first-cap-destination-content
  type: com.sap.application.content
  requires:
  - name: my-first-cap-destination-service
    parameters:
      content-target: true
  - name: my-first-cap-repo-host
    parameters:
      service-key:
        name: my-first-cap-repo-host-key
  - name: my-first-cap-xsuaa
    parameters:
      service-key:
        name: my-first-cap-xsuaa-key
  parameters:
    content:
      instance:
        destinations:
        - Name: my_first_cap_repo_host
          ServiceInstanceName: my-first-cap-html5-service
          ServiceKeyName: my-first-cap-repo-host-key
          sap.cloud.service: my.first.cap
        - Name: my_first_cap_uaa
          Authentication: OAuth2UserTokenExchange
          ServiceInstanceName: my-first-cap-xsuaa
          ServiceKeyName: my-first-cap-xsuaa-key
          sap.cloud.service: my.first.cap
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
resources:
- name: my-first-cap-xsuaa
  type: org.cloudfoundry.existing-service
  parameters:
    service-name: my-first-cap-xsuaa
- name: my-first-cap-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: my-first-cap-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: my-first-cap-html5-service
    service-plan: app-host
- name: my-first-cap-destination-service
  type: org.cloudfoundry.managed-service
  requires:
  - name: srv-api
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Name: srv-api
            URL: ~{srv-api/srv-url}
            Authentication: NoAuthentication
            Type: HTTP
            ProxyType: Internet
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
          - Name: ui5
            Authentication: NoAuthentication
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: my-first-cap-destination-service
    service-plan: lite
